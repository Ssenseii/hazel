name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            binary: dist/hazel.exe
          - os: ubuntu-latest
            platform: linux
            binary: dist/hazel
          - os: macos-latest
            platform: macos
            binary: dist/hazel

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # tkinter ships with Python on Windows/macOS but needs a separate package on Linux
      - name: Install tkinter (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: |
          pyinstaller \
            --onefile \
            --name hazel \
            --collect-data pyfiglet \
            --hidden-import tkinter \
            --hidden-import tkinter.filedialog \
            main.py

      - name: Package zip
        run: zip "hazel-${{ github.ref_name }}-${{ matrix.platform }}.zip" "${{ matrix.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hazel-${{ matrix.platform }}
          path: hazel-${{ github.ref_name }}-${{ matrix.platform }}.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/*.zip \
            --title "Hazel ${{ github.ref_name }}" \
            --generate-notes
